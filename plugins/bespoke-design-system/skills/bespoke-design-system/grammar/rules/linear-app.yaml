  emerges_from:
  - linear-app
  provenance: original
  confidence: 0.5
  inferred: true
- rule_id: linear-app-anti-pattern-warmth-in-chrome-010
  section: anti_patterns
  preconditions:
    kansei:
    - structured
    - calm
    - modern
    brand_archetypes:
    - Sage
    - Creator
  action:
    forbidden:
    - warm_colors_in_ui_chrome
    - decorative_use_of_brand_color
    - solid_colored_button_backgrounds
    - drop_shadow_for_depth_on_dark
    - pure_white_text
    - weight_700_bold
    - positive_letter_spacing_at_display
    - opaque_borders_on_dark_background
  why:
    establish: discipline-of-cool-restraint
    avoid:
    - aesthetic_drift_into_warm_friendly
    - marketing_decoration_creep
  emerges_from:
  - linear-app
  provenance: original
  confidence: 0.8
