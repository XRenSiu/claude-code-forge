rules:
- rule_id: linear-app-color-dark-native-001
  section: color
  preconditions:
    product_type:
    - developer_tool
    - b2b_saas
    - productivity_saas
    tone:
    - professional
    - modern
    - structured
    kansei:
    - structured
    - precise
    - calm
    - confident
    sd_anchors:
      warm_to_cold: 0.3
      ornate_to_minimal: 0.7
      serious_to_playful: -0.5
      modern_to_classical: -0.5
    brand_archetypes:
    - Sage
    - Creator
  action:
    base_canvas: near-black with imperceptible cool undertone (#08-#10 range)
    surface_strategy: luminance stepping (canvas -> panel -> elevated, +0.04 lightness per step)
    text_on_dark: 4-tier achromatic (gradient from
    max_text_lightness: 0.97 (avoid pure white)
  why:
    establish: dark-mode-as-native-medium quality
    avoid:
    - generic_dark_theme
    - light_theme_inverted
    - eye_strain_from_pure_white
    balance: precision ↔ readability
  emerges_from:
  - linear-app
  provenance: original
  confidence: 0.7
  known_conflicts:
  - rule: vercel-color-extreme-white-minimalism-001
    reason: dark-native canvas vs pure-white canvas — opposite base assumptions
  - rule: vercel-color-near-black-text-002
    reason: text rules apply to opposite background contexts
- rule_id: linear-app-color-single-chromatic-anchor-002
  section: color
  preconditions:
    product_type:
    - developer_tool
    - b2b_saas
    - productivity_saas
    - content_platform
    tone:
    - professional
    - focused
    kansei:
    - structured
    - calm
    - confident
    brand_archetypes:
    - Sage
    - Creator
  action:
    brand_chromatic_count: 1
    brand_hue_range:
    - 240
    - 270
    brand_saturation: 0.40-0.55
    brand_lightness: 0.55-0.65
    usage_constraint: only on primary CTA, brand mark, key interactive accents
  why:
    establish: brand-as-attention-anchor
    avoid:
    - decorative_brand_color_use
    - multiple_chromatic_competing
    - medical_pure_blue
    - gaming_pure_purple
    balance: brand presence ↔ chromatic restraint
  emerges_from:
  - linear-app
  provenance: original
  confidence: 0.75
- rule_id: linear-app-color-translucent-borders-003
  section: color
  preconditions:
    product_type:
    - developer_tool
    - b2b_saas
    - productivity_saas
    tone:
    - professional
    - refined
    kansei:
    - structured
    - calm
    brand_archetypes:
    - Sage
    - Creator
  action:
    border_strategy: semi-transparent white on dark surfaces
    border_alpha_range:
    - 0.05
    - 0.08
    avoid_solid_dark_borders_on_dark_bg: true
  why:
    establish: structure-without-visual-noise
    avoid:
    - hard_edge_visual_walls
    - opaque_borders_on_dark
    balance: definition ↔ visual_softness
  emerges_from:
  - linear-app
  provenance: original
  confidence: 0.7
  known_conflicts:
  - rule: vercel-elevation-shadow-as-border-005
    reason: translucent-white-border vs shadow-as-border — different border philosophies for different canvases
- rule_id: linear-app-typography-geometric-sans-with-features-004
  section: typography
  preconditions:
    product_type:
    - developer_tool
    - b2b_saas
    - productivity_saas
    tone:
    - professional
    - modern
    - precise
    kansei:
    - structured
    - precise
    - modern
    brand_archetypes:
    - Sage
    - Creator
  action:
    family_class: geometric_humanist_sans
    requires_opentype_features: true
    narrow_weight_range: true
    base_weight: 400
    signature_emphasis_weight: 510
    strong_emphasis_weight: 590
    no_weight_above: 590
  why:
    establish: typeface-as-engineered-identity
    avoid:
    - generic_inter_default
    - weight_700_bold_overstatement
    - decorative_typefaces
    balance: identity ↔ readability
  emerges_from:
  - linear-app
  provenance: original
  confidence: 0.7
- rule_id: linear-app-typography-display-compression-005
  section: typography
  preconditions:
    product_type:
    - developer_tool
    - b2b_saas
    - productivity_saas
    tone:
    - professional
    - modern
    - urgent
    kansei:
    - structured
    - precise
    - confident
    brand_archetypes:
    - Sage
    - Creator
  action:
    letter_spacing_at_display: aggressive_negative
    tracking_curve: scales_with_size_progressively_relaxing
    tracking_at_72px: -0.022em
    tracking_at_48px: -0.022em
    tracking_at_32px: -0.022em
    tracking_at_body: normal_to_slightly_negative
  why:
    establish: minified-engineered-headline-quality
    avoid:
    - loose_advertising_tracking
    - uniformly_tight_tracking_at_body_sizes
    balance: density ↔ readability_at_small_sizes
  emerges_from:
  - linear-app
  provenance: original
  confidence: 0.65
- rule_id: linear-app-components-button-near-zero-opacity-006
  section: components
  preconditions:
    product_type:
    - developer_tool
    - b2b_saas
    - productivity_saas
    tone:
    - refined
    - calm
    kansei:
    - structured
    - calm
    requires:
    - linear-app-color-dark-native-001
    brand_archetypes:
    - Sage
    - Creator
  action:
    button_default_bg: rgba(255,255,255,0.02-0.05)
    button_secondary_bg: transparent or near-transparent
    button_radius_px: 6
    reveal_via: hover_opacity_increase
  why:
    establish: ui-that-doesnt-shout
    avoid:
    - solid_buttons_on_dark
    - gradient_buttons
    balance: discoverability ↔ visual_calm
  emerges_from:
  - linear-app
  provenance: original
  confidence: 0.65
  known_conflicts:
  - rule: vercel-components-dark-pill-cta-007
    reason: transparent ghost button vs solid dark CTA — opposite primary-button strategies
- rule_id: linear-app-elevation-luminance-stepping-007
  section: depth_elevation
  preconditions:
    product_type:
    - developer_tool
    - b2b_saas
    - productivity_saas
    tone:
    - refined
    - modern
    kansei:
    - structured
    - calm
    requires:
    - linear-app-color-dark-native-001
    brand_archetypes:
    - Sage
    - Creator
  action:
    depth_strategy: background_luminance_stepping
    no_drop_shadow_on_dark: true
    level_increments_via: bg_alpha_white +0.02 per step
    use_inset_shadow_for_recessed: rgba(0,0,0,0.2) 0px 0px 12px 0px inset
  why:
    establish: depth-system-native-to-dark-medium
    avoid:
    - invisible_dark_shadows_on_dark
    - plastic_floating_cards
    balance: clear_layering ↔ visual_quietness
  emerges_from:
  - linear-app
  provenance: original
  confidence: 0.7
  known_conflicts:
  - rule: vercel-elevation-shadow-as-border-005
    reason: luminance-stepping vs shadow-as-border — different elevation systems for different canvases
  - rule: vercel-elevation-multi-layer-shadow-stack-006
    reason: no-shadow-on-dark vs multi-layer-shadow — incompatible philosophies
- rule_id: linear-app-spacing-8px-base-with-optical-008
  section: layout
  preconditions:
    product_type:
    - developer_tool
    - b2b_saas
    - productivity_saas
    - content_platform
    tone:
    - professional
    - structured
    kansei:
    - structured
    - precise
    brand_archetypes:
    - Sage
    - Creator
  action:
    base_unit: 8
    scale:
    - 1
    - 4
    - 7
    - 8
    - 11
    - 12
    - 16
    - 19
    - 20
    - 22
    - 24
    - 28
    - 32
    - 35
    includes_optical_micro_adjustments: true
    section_vertical_padding_min: 80
    no_explicit_section_dividers: true
  why:
    establish: mathematical-precision-with-optical-correction
    avoid:
    - pure_grid_with_no_optical_correction
    - dense_section_packing
    balance: structure ↔ readability
  emerges_from:
  - linear-app
  provenance: original
  confidence: 0.65
- rule_id: linear-app-voice-engineered-not-designed-009
  section: voice
  preconditions:
    product_type:
    - developer_tool
    - b2b_saas
    tone:
    - professional
    - restrained
    - technical
    kansei:
    - structured
    - precise
    - confident
    brand_archetypes:
    - Sage
    - Creator
  action:
