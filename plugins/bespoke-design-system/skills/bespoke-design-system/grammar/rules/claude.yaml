  emerges_from:
  - claude
  provenance: original
  confidence: 0.55
- rule_id: claude-voice-thoughtful-companion-010
  section: voice
  preconditions:
    product_type:
    - ai_assistant
    - literary_app
    tone:
    - thoughtful
    - humble
    - refined
    kansei:
    - thoughtful
    - calm
    - intellectual
    - warm
    brand_archetypes:
    - Sage
    - Caregiver
  action:
    voice_personality: thoughtful_companion_not_powerful_tool
    avoid_hyperbole: true
    avoid_specifications_first: true
    tone_register: respectful_of_intelligence
  why:
    establish: trusted-advisor-not-supreme-intelligence
    avoid:
    - marketing_superlatives
    - cold_technical_specs_first
    balance: capability_communication ↔ humility
  emerges_from:
  - claude
  provenance: original
  confidence: 0.5
- rule_id: claude-anti-pattern-tech-creep-011
  section: anti_patterns
  preconditions:
    kansei:
    - warm
    - refined
    - literary
    - thoughtful
    brand_archetypes:
    - Sage
    - Caregiver
  action:
    forbidden:
    - cool_blue_grays_anywhere
    - bold_weight_700_on_serif
    - saturated_chromatic_beyond_terracotta
    - sharp_corners_below_6px
    - heavy_drop_shadows
    - pure_white_page_background
    - geometric_tech_style_illustrations
    - body_line_height_below_1_40
    - mono_typography_for_prose
    - sans_serif_for_headlines
    - hyperbole_superlative_marketing_voice
  why:
    establish: discipline-of-warm-literary-aesthetic
    avoid:
    - drift_into_silicon_valley_tech
    - drift_into_cold_corporate
  emerges_from:
  - claude
  provenance: original
  confidence: 0.7
