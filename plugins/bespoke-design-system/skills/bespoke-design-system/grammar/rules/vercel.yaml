# Rules — vercel
# Generated by A3 from grammar/tokens/vercel.json + grammar/rationale/vercel.md

rules:

  - rule_id: vercel-color-extreme-white-minimalism-001
    section: color
    preconditions:
      product_type: [developer_tool, content_platform, infrastructure_saas]
      tone: [refined, restrained, professional]
      kansei: [minimal, structured, precise, calm]
      sd_anchors:
        warm_to_cold: 0.0
        ornate_to_minimal: 0.9
        serious_to_playful: -0.5
        modern_to_classical: -0.5
    action:
      base_canvas: pure_white (#ffffff)
      no_section_color_variation: true
      separation_via: shadow_borders_and_spacing_only
      whitespace_philosophy: gallery_emptiness
    why:
      establish: minimalism-as-engineering-principle
      avoid: [busy_section_backgrounds, decorative_color_blocks, aesthetic_pseudo_minimal]
      balance: information_density ↔ breathing_room
    emerges_from: [vercel]
    provenance: original
    confidence: 0.7

  - rule_id: vercel-color-near-black-text-002
    section: color
    preconditions:
      product_type: [developer_tool, content_platform, b2b_saas]
      tone: [authoritative, refined]
      kansei: [structured, precise]
    action:
      primary_text_hex: "#171717"   # not #000000
      reason_for_offset: micro_warmth_prevents_harshness
      neutral_scale: 6_steps_grayscale
    why:
      establish: micro-contrast-softness
      avoid: [printer_ink_pure_black, washed_out_grays]
      balance: authority ↔ visual_softness
    emerges_from: [vercel]
    provenance: original
    confidence: 0.6

  - rule_id: vercel-color-functional-only-accents-003
    section: color
    preconditions:
      product_type: [developer_tool, infrastructure_saas]
      tone: [restrained, functional]
      kansei: [structured, precise, minimal]
    action:
      chromatic_accent_count: small_set_with_strict_semantic_role
      accent_usage_rule: only_in_workflow_or_state_context
      no_decorative_chromatic_use: true
    why:
      establish: color-equals-function
      avoid: [decorative_color_use, brand-color-everywhere]
      balance: visual_interest ↔ semantic_clarity
    emerges_from: [vercel]
    provenance: original
    confidence: 0.7

  - rule_id: vercel-typography-geometric-sans-extreme-tracking-004
    section: typography
    preconditions:
      product_type: [developer_tool, infrastructure_saas]
      tone: [precise, urgent, modern]
      kansei: [structured, precise, modern, confident]
    action:
      family_class: geometric_sans_with_ligatures
      requires_opentype_features: [liga]
      letter_spacing_at_48px: -0.05em   # extremely aggressive
      letter_spacing_at_24px: -0.04em
      letter_spacing_at_16px_semibold: -0.02em
      tracking_relaxes_below_14px: true
      narrow_weight_range: [400, 500, 600]
      no_bold_700_in_body: true
    why:
      establish: minified-headline-quality
      avoid: [loose_tracking, weight_700_in_body]
      balance: visual_density ↔ readability
    emerges_from: [vercel]
    provenance: original
    confidence: 0.7

  - rule_id: vercel-elevation-shadow-as-border-005
    section: components
    preconditions:
      product_type: [developer_tool, content_platform, b2b_saas]
      tone: [refined, modern]
      kansei: [structured, precise, minimal]
    action:
      border_technique: box_shadow_zero_offset_zero_blur_1px_spread
      shadow_alpha: 0.08
      no_traditional_css_border_on_cards: true
      enables: smoother_transitions, no_clipping_at_radius
    why:
      establish: borders-coexist-with-elevation-cleanly
      avoid: [css_border_clipping_at_radius, visual_weight_of_solid_border]
      balance: structural_definition ↔ visual_lightness
    emerges_from: [vercel]
    provenance: original
    confidence: 0.65

  - rule_id: vercel-elevation-multi-layer-shadow-stack-006
    section: components
    preconditions:
      product_type: [developer_tool, content_platform, b2b_saas]
      tone: [refined]
      kansei: [structured, precise, minimal]
      requires: [vercel-elevation-shadow-as-border-005]
    action:
      shadow_layers: [border_layer, soft_elevation_layer, ambient_depth_layer, inner_highlight_layer]
      inner_highlight_color: "#fafafa"
      max_alpha_per_layer: 0.08
      total_visual_weight: whisper_level
    why:
      establish: cards-feel-built-not-floating
      avoid: [material_design_floating, single_heavy_shadow]
      balance: depth ↔ subtlety
    emerges_from: [vercel]
    provenance: original
    confidence: 0.65

  - rule_id: vercel-components-dark-pill-cta-007
    section: components
    preconditions:
      product_type: [developer_tool, infrastructure_saas]
      tone: [authoritative, modern]
      kansei: [structured, confident]
      requires: [vercel-color-extreme-white-minimalism-001, vercel-color-near-black-text-002]
    action:
      primary_cta_bg: near_black (#171717)
      primary_cta_text: white
      primary_cta_radius_px: 6   # NOT pill 9999
      pill_radius_reserved_for: [badge, status_tag]
    why:
      establish: highest-contrast-anchor-in-white-canvas
      avoid: [pill_radius_on_primary_action, gradient_ctas]
      balance: hierarchy ↔ visual_consistency
    emerges_from: [vercel]
    provenance: original
    confidence: 0.7

  - rule_id: vercel-spacing-jump-scale-008
    section: layout
    preconditions:
      product_type: [developer_tool, infrastructure_saas, content_platform]
      tone: [structured]
      kansei: [structured, precise, minimal]
    action:
      base_unit: 8
      primary_rhythm: [8, 16, 32]
      mid_range_gap: true   # 16 -> 32 jump (no 20/24)
      section_vertical_padding_min: 80
      section_vertical_padding_max: 120
    why:
      establish: forced-structural-choice-at-section-level
      avoid: [continuous_spacing_inconsistency, mood_based_spacing]
      balance: flexibility ↔ enforced_rhythm
    emerges_from: [vercel]
    provenance: original
    confidence: 0.55
    inferred: true   # the "no 20/24" is a structural choice the doc states; rationale is inferred

  - rule_id: vercel-voice-infrastructure-invisible-009
    section: voice
    preconditions:
      product_type: [developer_tool, infrastructure_saas]
      tone: [restrained, technical, authoritative]
      kansei: [structured, precise, calm, confident]
    action:
      voice_personality: infrastructure_made_invisible
      cta_verbs: [start_deploying, get_started, contact_sales]
      avoid_orchestral: true
      avoid_emoji_in_voice: true
    why:
      establish: presence-through-structure-not-decoration
      avoid: [marketing_orchestral, exclamation_heavy_copy]
      balance: voice_personality ↔ structural_silence
    emerges_from: [vercel]
    provenance: original
    confidence: 0.5
    inferred: true

  - rule_id: vercel-anti-pattern-decoration-creep-010
    section: anti_patterns
    preconditions:
      kansei: [minimal, structured, precise]
    action:
      forbidden:
        - warm_colors_in_chrome
        - heavy_shadows_above_alpha_0_1
        - css_border_on_cards
        - positive_letter_spacing_on_geist
        - weight_700_in_body
        - decorative_use_of_workflow_accents
        - pill_radius_on_primary_action
        - skipping_inner_fafafa_glow
    why:
      establish: discipline-of-engineered-minimalism
      avoid: [aesthetic_pseudo_minimal_drift, decorative_creep]
    emerges_from: [vercel]
    provenance: original
    confidence: 0.8
