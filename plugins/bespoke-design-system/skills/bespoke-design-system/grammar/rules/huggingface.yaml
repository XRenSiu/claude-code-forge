rules:
- rule_id: huggingface-color-yellow-as-punctuation-001
  section: color
  preconditions:
    product_type: [community_platform, ai_platform, ml_hub]
    tone: [warm, playful, approachable]
    kansei: [warm, playful, approachable, friendly, optimistic]
    sd_anchors:
      warm_to_cold: -0.4
      ornate_to_minimal: 0.3
      serious_to_playful: 0.5
      modern_to_classical: -0.3
    brand_archetypes: [Everyman, Jester]
  action:
    accent_hex: '#ffd21e'
    accent_role: punctuation_only
    forbid_accent_as_full_surface: true
    accent_use_areas: [pull_quote, badge, new_pill, model_card_header_strip]
    canvas_hex: '#fafafa'
  why:
    establish: yellow-as-punctuation-not-surface-keeps-cheer-readable
    avoid: [yellow_full_background, yellow_long_text_run, yellow_competing_with_category_accents]
    balance: brand_warmth ↔ readability
  emerges_from: [huggingface]
  provenance: original
  confidence: 0.55

- rule_id: huggingface-typography-mono-everywhere-002
  section: typography
  preconditions:
    product_type: [community_platform, ai_platform, ml_hub, developer_tool]
    tone: [technical, playful, approachable]
    kansei: [technical, structured, approachable]
    brand_archetypes: [Everyman, Sage]
  action:
    primary_family_class: monospace (e.g., IBM Plex Mono)
    sans_role: paragraphs_only
    mono_use_areas: [headings, tags, nav_links, metadata]
    metaphor: config_file_is_the_readme
  why:
    establish: mono-as-platform-dna-not-code-only-decoration
    avoid: [serif_heading, sans_tag, mono_in_code_blocks_only]
    balance: visual_warmth ↔ technical_identity
  emerges_from: [huggingface]
  provenance: original
  confidence: 0.5

- rule_id: huggingface-components-crisp-radius-1px-borders-003
  section: components
  preconditions:
    product_type: [community_platform, ai_platform, ml_hub, developer_tool]
    tone: [direct, technical, approachable]
    kansei: [direct, technical, dense, structured]
    brand_archetypes: [Everyman, Sage]
  action:
    radius_px_range: [4, 6]
    border_strategy: 1px_solid_announces_itself
    forbid_radius_above_8: true
    table_density: high_8px_16px_cell_padding
  why:
    establish: github-not-notion-borders-announce-themselves
    avoid: [12px_plus_friendly_saas_radius, 0px_completely_brutalist, pill_card]
    balance: dense_information ↔ approachable_warmth
  emerges_from: [huggingface]
  provenance: original
  confidence: 0.55

- rule_id: huggingface-components-category-tinted-task-tags-004
  section: components
  preconditions:
    product_type: [community_platform, ai_platform, ml_hub]
    tone: [playful, structured]
    kansei: [structured, expressive, friendly]
    brand_archetypes: [Everyman, Creator]
  action:
    tag_strategy: category_tinted_pair_strong_text_soft_bg
    enumerated_categories: [nlp_blue, vision_green, audio_purple, multimodal_pink, tabular_orange]
    tag_radius_px: 4
    tag_font_class: monospace_small_uppercase_optional
  why:
    establish: taxonomy-as-color-allows-quick-scan
    avoid: [single_color_all_tags, free_tag_color_inflation, no_taxonomic_color_system]
    balance: brand_simplicity ↔ taxonomic_richness
  emerges_from: [huggingface]
  provenance: original
  confidence: 0.5

- rule_id: huggingface-typography-weight-cap-600-005
  section: typography
  preconditions:
    product_type: [community_platform, ai_platform, ml_hub]
    tone: [warm, approachable]
    kansei: [warm, approachable, friendly]
    brand_archetypes: [Everyman, Jester]
  action:
    weight_max: 600
    weight_forbidden: [700, 800, 900]
    hierarchy_via_size_and_color: true
    rationale_against_700: too_loud_against_yellow_accent
  why:
    establish: weight-cap-prevents-fight-with-yellow-punctuation
    avoid: [700_bold_heading, 800_display, weight_driven_hierarchy_with_yellow_present]
    balance: hierarchy_clarity ↔ accent_color_harmony
  emerges_from: [huggingface]
  provenance: original
  confidence: 0.5
