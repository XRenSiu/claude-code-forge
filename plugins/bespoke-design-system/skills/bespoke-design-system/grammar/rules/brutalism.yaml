# Rules — brutalism
# Generated by A3 from grammar/tokens/brutalism.json + grammar/rationale/brutalism.md
# Note: source DESIGN.md is template-thin; rules carry low confidence and lean on brutalism genre conventions.

rules:

  - rule_id: brutalism-color-warm-functional-binary-001
    section: color
    preconditions:
      product_type: [editorial, art_portfolio, indie_creative, anti_corporate]
      tone: [raw, expressive, unapologetic]
      kansei: [bold, raw, daring, expressive]
      sd_anchors:
        warm_to_cold: -0.3
        ornate_to_minimal: 0.5
        serious_to_playful: -0.4
        modern_to_classical: 0.2
    action:
      base_canvas: pure white #ffffff
      primary_chromatic: warm earthy (terracotta-orange / mustard / oxidized-metal hue range 15-40°)
      text_strategy: pure black on white (high-contrast binary)
      no_gray_ladder: true
    why:
      establish: anti-design-functional-binary
      avoid: [decorative_gradients, cyberpunk_cool_palette, gentle_gray_softening]
      balance: rawness ↔ legibility
    emerges_from: [brutalism]
    provenance: original
    confidence: 0.45

  - rule_id: brutalism-typography-grotesque-broad-weight-002
    section: typography
    preconditions:
      product_type: [editorial, art_portfolio, indie_creative]
      tone: [raw, expressive]
      kansei: [bold, raw, expressive]
    action:
      family_class: grotesque_or_neo_grotesque (historical weight)
      weight_range: 100-900 (full ladder open)
      hierarchy_via: extreme_weight_contrast (not size_alone)
      no_decorative_typefaces: true
    why:
      establish: typographic-as-primary-expression
      avoid: [geometric_perfection, serif_elegance, single_medium_weight]
      balance: identity ↔ readability
    emerges_from: [brutalism]
    provenance: original
    confidence: 0.4
    inferred: true

  - rule_id: brutalism-spacing-tight-functional-003
    section: spacing
    preconditions:
      product_type: [editorial, art_portfolio]
      tone: [raw, dense]
      kansei: [bold, dense]
    action:
      base_unit: 8
      scale: [4, 8, 12, 16, 24, 32]
      density_intent: tight (jarring proximity preferred over generous breathing)
      avoid_section_padding_above: 64
    why:
      establish: jarring-density-is-the-point
      avoid: [gallery_emptiness, generous_breathing_room]
      balance: information_density ↔ structural_clarity
    emerges_from: [brutalism]
    provenance: original
    confidence: 0.4
    inferred: true

  - rule_id: brutalism-components-single-chromatic-anchor-004
    section: components
    preconditions:
      product_type: [editorial, art_portfolio]
      tone: [raw, decisive]
      kansei: [bold, decisive]
    action:
      primary_cta_bg: warm_chromatic (terracotta or oxide range)
      secondary_button_strategy: neutral_or_outline_only
      no_gradient_or_shadow_decoration: true
    why:
      establish: visual-hammer
      avoid: [multiple_competing_ctas, decorative_button_effects]
      balance: salience ↔ chromatic_discipline
    emerges_from: [brutalism]
    provenance: original
    confidence: 0.45

  - rule_id: brutalism-motion-functional-not-dramatic-005
    section: motion
    preconditions:
      kansei: [raw, decisive, focused]
    action:
      duration_ms_range: [150, 250]
      easing: stable (no bounce, no overshoot, no spring)
      no_decorative_motion: true
    why:
      establish: motion-as-feedback-not-spectacle
      avoid: [bounce_easing, long_dramatic_transitions, theatrical_animation]
      balance: feedback_clarity ↔ raw_directness
    emerges_from: [brutalism]
    provenance: original
    confidence: 0.4

  - rule_id: brutalism-voice-imperative-no-marketing-006
    section: voice
    preconditions:
      kansei: [raw, confident, direct]
    action:
      cta_register: imperative_action_verbs
      avoid_marketing_orchestral: true
      avoid_generic_filler: true
    why:
      establish: anti-design-anti-marketing
      avoid: [decorative_copy_transitions, generic_corporate_filler]
      balance: clarity ↔ identity
    emerges_from: [brutalism]
    provenance: original
    confidence: 0.4
    inferred: true

  - rule_id: brutalism-anti-pattern-decoration-creep-007
    section: anti_patterns
    preconditions:
      kansei: [raw, bold, expressive]
    action:
      forbidden:
        - off_palette_decorative_colors
        - flat_hierarchy_via_uniform_size_weight
        - decorative_effects_reducing_readability
        - mixing_unrelated_visual_metaphors
        - gradient_buttons
        - rounded_card_shadow_softening
    why:
      establish: discipline-of-anti-design
      avoid: [aesthetic_drift_into_polish, marketing_template_creep]
    emerges_from: [brutalism]
    provenance: original
    confidence: 0.5
