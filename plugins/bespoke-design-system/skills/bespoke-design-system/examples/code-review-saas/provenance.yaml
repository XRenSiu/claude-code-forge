  - decision: 8px base spacing with optical micro-corrections
    section: layout
    inheritance:
      source_rules: [linear-app-spacing-8px-base-with-optical-008, vercel-spacing-jump-scale-008]
      source_systems: [linear-app, vercel]
      original_rationale: |
        Linear (linear-app-spacing-8px-base-with-optical-008): mathematical precision with optical
        correction. base_unit: 8. scale: [1,4,7,8,11,12,16,19,20,22,24,28,32,35].
        section_vertical_padding_min: 80. Avoids pure-grid-no-optical-correction and
        dense-section-packing.

        Vercel (vercel-spacing-jump-scale-008): forced structural choice. base_unit: 8.
        primary_rhythm: [8, 16, 32] (mid-range gap is intentional — no 20/24 in primary scale).
        section_vertical_padding_min: 80, max: 120. Avoids continuous-spacing-inconsistency.
    adaptation:
      fully_aligned_kansei: [structured, precise]
      needs_extension_kansei: []
      modifications:
        - dimension: scale_density
          from: Linear's full scale [4,7,8,11,12,16,19,20,22,24,28,32,35]
          to: [4, 7, 8, 11, 12, 16, 20, 24, 32, 48, 64, 96]
          reason: |
            Kept Linear's optical correction (7, 11) and 8/16/24/32 backbone.
            Removed Linear's 19/22/28/35 as redundant for review-tool layout density.
            Added 48/64/96 for section-level rhythm (Linear's max was 35 — too small for our
            section padding requirements).
            Vercel's principle of "deliberate mid-range" was acknowledged but NOT adopted
            (Vercel skips 20/24 entirely; we kept them because diff/comment indentation needs
            them — this is a content-driven divergence, not a Vercel inheritance).
      preserved:
        - 'base_unit: 8 (from both source rules)'
        - 'optical_micro_adjustments: 7, 11 (from Linear)'
        - 'section_vertical_padding_min: 80 (from BOTH source rules — round-1 finding corrected; earlier draft incorrectly listed 64px which was an undeclared deviation)'
        - 'section_vertical_padding_max: 120 (from Vercel)'
    justification:
      internal_consistency:
        - Diff line height 1.5 with 8px row vertical padding (8 from base_unit)
        - Comment thread indent uses 24px (mid-range value retained, content-driven)
        - Section padding minimum 80px (preserved from both source rules — DESIGN.md section 5 updated to match)
        - Landing page section padding 96-120px (within Vercel's 80-120 range)
      user_kansei_coverage:
        addressed_in_this_decision: [structured, precise]
        addressed_elsewhere: [calm]
        uncovered: []
      conflict_check:
        none
    confidence: medium

