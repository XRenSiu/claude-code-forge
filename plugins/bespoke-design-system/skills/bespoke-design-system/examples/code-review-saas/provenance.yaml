decisions:

  - decision: Canvas Black #0c0d0f as primary background
    section: color
    inheritance:
      source_rules: [linear-app-color-dark-native-001]
      source_systems: [linear-app]
      original_rationale: |
        Establish dark-mode-as-native-medium quality. Avoid generic dark theme,
        light-theme-inverted, eye strain from pure white. Balance: precision ↔ readability.
    adaptation:
      fully_aligned_kansei: [structured, precise, calm, confident]
      needs_extension_kansei: [focused]   # focused added via brief's "judgment-worthy diffs" emphasis
      modifications:
        - dimension: lightness
          from: 0.04 (Linear's #08090a)
          to: 0.05 (#0c0d0f)
          reason: very slight lightness lift (≈0.01) softens code-on-canvas contrast for long review sessions; still meets dark-native rule
      preserved:
        - cool undertone (no warmth)
        - 4-tier achromatic text scale (just shifted to #f4-#5d range from Linear's #f7-#62)
    justification:
      internal_consistency:
        - Pairs with section 3 typography color #f4f5f7 (16:1 contrast on canvas)
        - Pairs with section 6 elevation system: luminance stepping requires dark canvas
        - Pairs with section 4 ghost button strategy: rgba white at 0.02–0.05 only works on dark
      user_kansei_coverage:
        addressed_in_this_decision: [structured, precise, calm, confident]
        addressed_elsewhere: [focused, modern]
        uncovered: []
      conflict_check:
        none
    confidence: high

  - decision: Single chromatic anchor — Review Blue #4d7df0
    section: color
    inheritance:
      source_rules: [linear-app-color-single-chromatic-anchor-002, vercel-color-functional-only-accents-003]
      source_systems: [linear-app, vercel]
      original_rationale: |
        Linear: brand-as-attention-anchor. Avoid decorative use, avoid medical pure blue,
        avoid gaming pure purple. Vercel: color = function. Avoid decorative chromatic use.
    adaptation:
      fully_aligned_kansei: [structured, calm, confident, focused]
      needs_extension_kansei: []
      modifications:
        - dimension: hue
          from: 240-270° (Linear's indigo-violet, hue ~250°)
          to: 220° (calmed teal-blue)
          reason: profile reverse_constraint includes 'aggressive'; pure violet leans aggressive when amplified by code-review tension. Teal-leaning blue stays cool but reads as "supportive" rather than "warning"
      preserved:
        - chromatic_count: 1 (single anchor)
        - usage_constraint: only on primary CTA + active state
        - saturation: 0.50 (within Linear rule's allowed 0.40-0.55 range — within-range choice favoring slight calm; not a deviation requiring adaptation framing — corrected from B5 round-1 finding)
    justification:
      internal_consistency:
        - Diff comment thread uses rgba(77,125,240,0.3) left-border — same hue at low alpha for thread accent (chromatic discipline preserved)
        - Status colors (green/red/amber) are not part of brand chromatic count — they're functional-only as per rule 002
      user_kansei_coverage:
        addressed_in_this_decision: [focused, calm, confident]
        addressed_elsewhere: [structured, precise]
        uncovered: []
      conflict_check:
        none
    confidence: medium

  - decision: Inter Variable + cv01,ss03 + 510 signature weight
    section: typography
    inheritance:
      source_rules: [linear-app-typography-geometric-sans-with-features-004, vercel-typography-geometric-sans-extreme-tracking-004]
      source_systems: [linear-app, vercel]
      original_rationale: |
        Both source systems use geometric sans with OpenType features and narrow weight range.
        Linear's signature is 510 between regular and medium. Both reject weight 700.
    adaptation:
      fully_aligned_kansei: [structured, precise, modern, confident]
      needs_extension_kansei: [focused]
      modifications:
        - dimension: typeface_choice
          from: Inter Variable (Linear) OR Geist (Vercel)
          to: Inter Variable
          reason: profile leans toward Linear's broader range and signature 510 weight; Geist's extreme negative tracking would over-amplify "urgent" beyond review-tool calm
      preserved:
        - cv01,ss03 features (from Linear)
        - 3-tier weight discipline (400/510/590, no 700)
        - aggressive negative letter-spacing at display only
    justification:
      internal_consistency:
        - Heading hierarchy uses 510 throughout (matches the rule's signature weight choice)
        - Active-state UI uses 590 (the strong-emphasis weight defined here)
        - Diff code uses JetBrains Mono — separate family for code, consistent with both source systems' mono treatment
      user_kansei_coverage:
        addressed_in_this_decision: [structured, precise, modern]
        addressed_elsewhere: [focused, calm, confident]
        uncovered: []
      conflict_check:
        none
      anti_slop_rebuttal:
        pattern: B1_inter_default_font (Inter for both display and body)
        why_not_slop_here: |
          Inter is the default-slop choice ONLY when paired with default weight (regular)
          and default features (none). Here it is mandatorily used with cv01+ss03 OpenType
          features and the 510 signature weight — this combination is recognizable as
          Linear's specific Inter usage, not generic Inter. The single OpenType setting
          alone visibly differentiates 'a' and 'l' glyphs, which is why Linear specified
          the rule. For Sage+Creator profiles requiring "engineered precision", Inter+cv01+ss03
          is one of two production-validated choices (Linear's Inter or Vercel's Geist) —
          we chose Inter because Geist's -2.4px tracking would over-amplify urgency for a
          calm review tool. The Sage archetype's "geometric humanist" typeface tendency
          (per references/brand-archetypes.md) makes Inter substantively right, not default.
    confidence: high

