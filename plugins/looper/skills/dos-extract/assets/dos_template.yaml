# =============================================================================
# Design Ontology Spec (DOS) Template v1.0
# =============================================================================
# 这是一份可填写的模板。每个字段都带了内嵌注释告诉你"为什么要写这个"和"怎么写好"。
# 用法：复制此文件，重命名为 `dos.yaml` 或 `<product>.dos.yaml`，删除注释填入内容。
#
# 阅读顺序建议：
#   1. 第 0 节 元信息（Meta）—— 立个名分
#   2. 第 1 节 范围（Scope）—— 划清边界
#   3. 第 2 节 复用（Reuse）—— 别重造轮子
#   4. 第 3 节 核心对象（Objects）—— 先收敛到 ≤7 个
#   5. 第 4 节 关系（Relationships）—— 主谓宾句式
#   6. 第 5 节 规则（Rules）—— 用大白话
#   7. 第 6 节 组合（Composition）—— 高阶概念怎么涌现
#   8. 第 7 节 系统行为（Behaviors）—— 因果链
#   9. 第 8 节 限界上下文（Bounded Contexts）—— 大产品才需要
#  10. 第 9 节 Agent 守则—— 给 AI 看的
#  11. 第 10 节 反模式 —— 把踩过的坑固化
#  12. 第 11 节 开放问题 —— 必须有 owner 和 deadline
#  13. 第 12 节 演化日志 —— DOS 自身的版本史
# =============================================================================


# -----------------------------------------------------------------------------
# 0. 元信息（Meta）
# -----------------------------------------------------------------------------
meta:
  dos_version: "0.1.0"            # 语义化版本：本体大改 = major、加对象 = minor、改描述 = patch
  product: ""                      # 产品名
  bounded_context: ""              # 这份 DOS 覆盖的限界上下文（DDD 概念）
  owner: ""                        # 谁对这份 DOS 负责（不是"团队"，要写人名）
  status: "draft"                  # draft | active | deprecated
  last_reviewed: "YYYY-MM-DD"      # 上次集体评审日期
  related_docs:                    # 相关链接：PRD、Design System、API 规范等
    - ""


# -----------------------------------------------------------------------------
# 1. 范围（Scope）—— 划清边界，避免无限蔓延
# -----------------------------------------------------------------------------
scope:
  in_scope: |
    # 这个 DOS 覆盖什么？用 2-3 句话说清楚。
    # 例: 本 DOS 描述 Xmind Agent 的 Chat + Canvas 双面板交互模型，
    # 涵盖用户对话、思维节点生成、画布操作的核心概念。

  out_of_scope: |
    # 明确写出**不**覆盖什么，避免被反复追问。
    # 例: 不涵盖 Xmind 桌面端的传统编辑器、协同编辑功能、
    # 以及 Xmind SaaS 的账户/订阅体系。

  audience:                        # 谁会读这份 DOS？影响用词的难度
    - "designers"
    - "PM"
    - "frontend engineers"
    - "AI agents (Claude Code, Cursor, internal Xmind Agent)"

  success_criteria: |
    # 这份 DOS 写得好的标志是什么？写出来逼自己讲清楚。
    # 例: 一个新加入的工程师能仅凭这份 DOS 在 1 小时内画出系统的核心数据流图。


# -----------------------------------------------------------------------------
# 2. 复用（Reuse）—— NeOn 方法论核心：能复用就别重造
# -----------------------------------------------------------------------------
reuse:
  # 团队内部已有的 DOS / 概念模型
  internal_references:
    - name: ""
      url: ""
      adopted_concepts: []         # 借用了哪些对象/关系
  
  # 行业标准本体或参考资料
  external_references:
    - name: "Schema.org / ActivityStreams / W3C XXX"
      url: ""
      adopted_concepts: []

  # 主动声明**不复用**的部分（避免之后被质疑"为什么不用 X"）
  deliberate_divergence:
    - from: ""
      reason: ""


# -----------------------------------------------------------------------------
# 3. 核心对象（Objects / Nouns）—— 系统的"宇宙基本粒子"
# -----------------------------------------------------------------------------
# 规则：
#   - 数量 ≤ 7（魔法数字 7±2）。如果你写了 12 个，大概率有合并空间。
#   - 不写 UI 元素（按钮、卡片、Modal 不是对象，是表现层）。
#   - 不写功能（"评论功能"不是对象，"Comment"才是）。
#   - 写完之后做一个删除练习："如果删掉这个对象，系统还能成立吗？" 能 → 它就该删。
# -----------------------------------------------------------------------------
objects:
  ExampleObject:
    description: |
      # 一句话说明这是什么。不要超过 25 字。
      # 反例: "代表系统中可以被用户操作的一种内容单元"（说了等于没说）
      # 正例: "用户发布的一条公开短消息"
    
    type: "entity"                 # entity | value_object | aggregate_root
                                   # entity: 有唯一身份、生命周期长
                                   # value_object: 不可变、由属性定义（如 Money、Address）
                                   # aggregate_root: entity 的子类，是某组对象的"门户"
    
    properties:
      id:
        type: "string"
        required: true
        description: "唯一标识符"
      created_at:
        type: "timestamp"
        required: true
      # ... 其他业务属性
    
    identity_rule: |
      # 这个对象靠什么识别？
      # 例: 由 id 唯一标识；同名不同 id 视为不同对象。
    
    lifecycle: |
      # 简述生命周期。可选但强烈建议写。
      # 例: 创建 → 发布 → 可被回复/转发 → 可被作者删除 → 软删除保留 30 天


# -----------------------------------------------------------------------------
# 4. 关系（Relationships / Verbs）—— 对象之间怎么互动
# -----------------------------------------------------------------------------
# 规则：
#   - 句式统一: 主语 - 动词(全大写) - 宾语
#   - 动词要"自然"：换个同义词如果意思变了，就说明你词没选对
#   - 标注**基数**（cardinality）：1对1、1对多、多对多
#   - 标注是否**可逆**：A FOLLOWS B 不一定意味着 B FOLLOWS A
# -----------------------------------------------------------------------------
relationships:
  - subject: "Person"
    verb: "CREATES"
    object: "Tweet"
    cardinality: "1:N"             # 一个 Person 可以创建多个 Tweet
    inverse: "AUTHORED_BY"         # Tweet AUTHORED_BY Person
    description: ""

  - subject: ""
    verb: ""
    object: ""
    cardinality: ""                # 1:1 | 1:N | N:N
    inverse: ""                    # 反向关系名，没有则写 null
    description: ""


# -----------------------------------------------------------------------------
# 5. 规则（Rules / Constraints）—— 系统的"宪法条款"
# -----------------------------------------------------------------------------
# 规则：
#   - 用陈述句、肯定式表述（"必须"、"不能"、"至多"）
#   - 一条规则只说一件事
#   - 用大白话，不要用 OWL 形式逻辑（除非读者就是 OWL 工程师）
# -----------------------------------------------------------------------------
rules:
  - id: "R001"
    statement: ""                  # 例: "一条 Tweet 必须有且只有一个作者"
    rationale: ""                  # 为什么要有这条规则
    enforced_by: "system"          # system | user_workflow | not_enforced

  - id: "R002"
    statement: ""
    rationale: ""
    enforced_by: ""


# -----------------------------------------------------------------------------
# 6. 组合（Composition）—— 高阶概念怎么从基础对象涌现
# -----------------------------------------------------------------------------
# 这是 Gordon Brander "简单字母表"思想的落地：
# 高阶概念不是"新对象"，而是基础对象的**派生视图**或**组合结构**。
# -----------------------------------------------------------------------------
composition:
  Feed:
    description: "用户主页看到的内容流"
    derived_from:
      - "由当前用户 FOLLOWS 的 Person 创建的 Tweets"
      - "按 created_at 倒序排列"
    is_persistent: false           # true=有持久化实体；false=纯派生视图


# -----------------------------------------------------------------------------
# 7. 系统行为（Behaviors）—— 因果链，描述"X 发生时 Y 会变"
# -----------------------------------------------------------------------------
# 这一节是给 AI agent 看的"副作用清单"，避免它生成代码时漏掉级联效应。
# -----------------------------------------------------------------------------
behaviors:
  - trigger: ""                    # 什么动作触发
    effects:                       # 会引起哪些状态变化
      - ""
    notes: ""

  # 例:
  # - trigger: "Person LIKES Tweet"
  #   effects:
  #     - "Tweet.like_count += 1"
  #     - "该 Tweet 在 Feed 中的排序权重提升"
  #     - "向 Tweet 作者推送通知"
  #   notes: "重复点赞应是幂等操作"


# -----------------------------------------------------------------------------
# 8. 限界上下文（Bounded Contexts）—— 大产品才需要，小产品可删
# -----------------------------------------------------------------------------
# 当产品大到一份 DOS 装不下时，按业务边界拆成多个 Bounded Context。
# 这一节描述本 DOS 与其他 Context 之间的"翻译关系"（DDD 的 Context Map）。
# -----------------------------------------------------------------------------
bounded_contexts:
  current_context: ""              # 本 DOS 所属的 Context

  upstream_contexts:               # 我依赖的上游 Context
    - name: ""
      provides: []                 # 上游给我提供什么概念
      translation_notes: ""        # 在我这里这个概念叫什么、有什么差异

  downstream_contexts:             # 依赖我的下游 Context
    - name: ""
      consumes: []


# -----------------------------------------------------------------------------
# 9. Agent 守则（Agent Guidelines）—— 给 AI 看的"工作纪律"
# -----------------------------------------------------------------------------
# 这是 DOS 区别于传统本体最关键的一节。
# 把"AI agent 在和这个 DOS 打交道时该做什么/不该做什么"明确写出来。
# -----------------------------------------------------------------------------
agent_guidelines:
  must:
    - "所有用户动作必须映射到本 DOS 已定义的关系（relationships 节）"
    - "生成的代码中，类名/字段名必须使用本 DOS 的术语（不可同义词替换）"
    - "如发现需要新对象/新关系，先在 PR 描述中提议修改 DOS，不要直接在代码里引入"

  should:
    - "优先扩展已有关系而非创建新关系"
    - "同一概念在不同上下文中保持同名"

  must_not:
    - "不得引入未在 objects 节声明的核心对象"
    - "不得用 UI 词汇（如 Card、Modal）作为业务对象名"
    - "不得在生成的代码中创建违反 rules 节任何一条的逻辑"


# -----------------------------------------------------------------------------
# 10. 反模式（Anti-Patterns）—— 把踩过的坑固化下来
# -----------------------------------------------------------------------------
# 每条反模式记录一次"我们曾经犯过的本体错误"。
# 这部分会随时间增长，是 DOS 最有价值的资产之一。
# -----------------------------------------------------------------------------
anti_patterns:
  - pattern: ""                    # 错误的做法
    why_bad: ""                    # 为什么坏
    correct_approach: ""           # 应该怎么做
    historical_context: ""         # 何时发现的、谁踩的坑（可选）

  # 例:
  # - pattern: "把 Post / Message / Tweet 建成三个独立对象"
  #   why_bad: "三者本质都是用户发布的内容单元，分裂后导致权限/搜索/通知逻辑要写三遍"
  #   correct_approach: "统一为 Post，用 type 字段或子类型区分形态"
  #   historical_context: "2025-Q3 重构血泪史"


# -----------------------------------------------------------------------------
# 11. 开放问题（Open Questions）—— 悬而未决的本体问题
# -----------------------------------------------------------------------------
# 重要原则：每个开放问题必须有 owner 和 deadline，否则会腐蚀本体。
# 解决之后把问题挪到 evolution_log，写明结论。
# -----------------------------------------------------------------------------
open_questions:
  - id: "Q001"
    question: ""
    raised_at: "YYYY-MM-DD"
    raised_by: ""
    owner: ""                      # 必填，必须是人名不是团队名
    deadline: "YYYY-MM-DD"         # 必填
    impact_if_unresolved: ""       # 不解决会怎样
    candidates: []                 # 候选答案


# -----------------------------------------------------------------------------
# 12. 演化日志（Evolution Log）—— DOS 自己的 changelog
# -----------------------------------------------------------------------------
# 每次修改 DOS 都要在这里留痕。这是本体演化的"基因图谱"。
# -----------------------------------------------------------------------------
evolution_log:
  - version: "0.1.0"
    date: "YYYY-MM-DD"
    author: ""
    change_type: "initial"         # initial | add | remove | rename | refactor
    summary: ""                    # 一句话总结
    rationale: ""                  # 为什么改
    breaking: false                # 是否破坏性变更（影响下游 Context 或现有代码）

# =============================================================================
# 模板结束
# =============================================================================
