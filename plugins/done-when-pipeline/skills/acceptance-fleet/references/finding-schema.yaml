# ============================================================================
# 3. requirement-tracer output (Agent-as-Judge per-REQ verdicts)
# ============================================================================
role: requirement-tracer
model: claude-opus-4-7
iteration: 3
vendor: claude
duration_seconds: 73
findings:                               # one finding per REQ that is NOT fully_compliant
  - finding_id: rt-001
    severity: P1                        # P1 because partially_compliant on a critical REQ
    based_on: REQ-002
    file: src/billing/cancel_subscription_use_case.ts
    line_range: [42, 58]
    root_cause: |
      REQ-002 SHALL clause requires "the cancellation timestamp is recorded
      in UTC ISO-8601 format". Code records local time, not UTC.
    evidence:
      tool_traces:
        - { tool: LOCATE, query: "cancel*", matched: src/billing/cancel_subscription_use_case.ts }
        - { tool: READ, file: src/billing/cancel_subscription_use_case.ts, lines: [42, 58] }
        - { tool: RETRIEVE, looking_for: "test for REQ-002", found: tests/subscription-cancellation/unit/test_cancel_records_timestamp.py }
      tool_observations: |
        The impl uses new Date().toString() (local time) at line 47, not
        new Date().toISOString() (UTC). The test fixture happens to run in UTC
        TZ so the test passes locally but would fail on a non-UTC server.
    confidence: high

per_req_compliance:                     # complete verdict matrix — even fully_compliant REQs listed
  - req_id: REQ-001
    verdict: fully_compliant
    evidence:
      file: src/billing/cancel_subscription_use_case.ts
      line_range: [12, 41]
      tool_traces: [...]
  - req_id: REQ-002
    verdict: partially_compliant
    finding_id: rt-001                  # cross-ref to findings: above
  - req_id: REQ-003
    verdict: requires_human_verification
    reason: "REQ-003 is about UI affordance presence and visual hierarchy — programmatic check not feasible"

# ============================================================================
# 4. design-reviewer output
# ============================================================================
role: design-reviewer
model: claude-opus-4-7
iteration: 3
vendor: claude
duration_seconds: 38
findings:
  - finding_id: dr-001
    severity: P2
    based_on: REQ-004
    file: src/billing/cancel_subscription_use_case.ts
    line_range: [88, 92]
    root_cause: |
      Impl satisfies REQ-004 SHALL clause via a lookup table of the 3 known
      subscription tiers. proposal.md states the system supports "arbitrary
      tier expansion via config" — the lookup table would silently regress
      to default on a 4th tier rather than honor the configured behavior.
    evidence:
      what_intent_was: "tier-agnostic behavior driven by config"
      what_impl_does: "hardcoded switch over {basic, pro, enterprise}"
    confidence: medium

# ============================================================================
# 5. adversarial-reviewer output (CROSS-VENDOR preferred)
# ============================================================================
role: adversarial-reviewer
model: codex-gpt-5                      # cross-vendor evaluator
iteration: 3
vendor: openai
duration_seconds: 91
findings:
  - finding_id: ar-001
    severity: P0
    based_on: REQ-001
    file: src/billing/cancel_subscription_use_case.ts
    line_range: [47, 47]
    root_cause: |
      Concurrent cancellation window: between status check at L42 and status
      mutation at L47, a second concurrent cancellation request reads the
      same active status, both proceed to mutate, the second overwrites end_date
      to a later value. Causes double-charge in next billing cycle.
    reproduction_scenario: |
      Two HTTP POST /api/subscription/cancel for the same user_id within ~10ms.
      No lock, no idempotency key, no advisory lock on subscription row.
    confidence: high
  - finding_id: ar-002
    severity: P1
    based_on: REQ-005
    file: src/billing/refund_queue.ts
    line_range: [22, 24]
    root_cause: |
      retry_job for refund is enqueued by cancellation flow even when the
      cancellation itself errored. Causes a refund attempt for a subscription
      that was never actually cancelled.
    reproduction_scenario: |
      Cancellation request that fails after L19 (refund_queue.enqueue) but
      before L25 (status mutation). retry_job picks up the orphan.
    confidence: high

# ============================================================================
# 6. edge-case-hunter output
# ============================================================================
role: edge-case-hunter
model: claude-opus-4-7
iteration: 3
vendor: claude
duration_seconds: 56
findings:
  - finding_id: eh-001
    severity: P1
    category: state_transitions
    based_on: REQ-006
    file: src/billing/subscription_state_machine.ts
    line_range: [104, 119]
    root_cause: |
      Transition trial_active → cancelled_active is reachable (the SHALL clause
      allows it) but no test in tests/subscription-cancellation/ exercises it.
      Impl mutates `trial_end_date` to NOW on this transition, which deletes
      the user's remaining trial days.
    input_sequence: |
      1. User starts trial subscription (trial_active state)
      2. User cancels within trial period
      3. Bug: trial_end_date is overwritten to cancellation timestamp instead
         of being preserved (the spec says "keep access until end of paid
         period" — trial period qualifies as paid).
    confidence: high

# ============================================================================
# 7. e2e-explorer output
# ============================================================================
role: e2e-explorer
model: claude-opus-4-7
iteration: 3
vendor: claude
duration_seconds: 142
findings:
  - finding_id: ee-001
    severity: P2
    based_on: REQ-007
    file: src/ui/CancelSubscriptionButton.tsx
    line_range: [55, 60]
    root_cause: |
      Confirmation modal does not show end-of-paid-period date. Spec REQ-007
      SHALL "the user sees their access end date before confirming".
    navigation_sequence:
      - { action: navigate, url: "/account/subscription" }
      - { action: click, selector: "[data-testid=cancel-subscription-button]" }
      - { action: screenshot, file: "ratchet-log/iteration-003/screenshots/ee-001-no-end-date.png" }
    confidence: high

# ============================================================================
# 8. spec-gaming-detector output
# ============================================================================
role: spec-gaming-detector
model: claude-opus-4-7
iteration: 3
vendor: claude
duration_seconds: 67
gaming_risk_score: 5                    # 0-10; >=7 triggers GAMING_RISK ratchet state
findings:
  - finding_id: gd-001
    severity: P1
    pattern: coverage_gaming
    based_on: REQ-001
    file: src/billing/cancel_subscription_use_case.ts
    line_range: [78, 92]
    spec_robustness_triggered: "surfaced_vectors[0] (branch_coverage_gap from S2.5)"
    evidence:
      before_iteration: 2
      after_iteration: 3
      what_changed: |
        Iteration 2's impl had error-branch handling at L85 (catch block with
        retry logic). Iteration 3 replaced with empty catch + log. Line
        coverage stayed at 0.87; mutation_kill_rate dropped from 0.81 to 0.76
        (still above threshold 0.70 so it slipped past).
      diff: |
        - } catch (e) { await retryWithBackoff(e); throw e; }
        + } catch (e) { logger.warn(e); }
    suggested_mitigation: |
      Add to done_when.yaml.behavior.thresholds: branch_coverage threshold via
      spec-robustness.md verifier_hints (since branch_coverage isn't in v1
      schema). Or rewrite REQ-001 to explicitly require retry-on-transient.
    confidence: high

# ============================================================================
# META-JUDGE OUTPUT (synthesis only, no re-review)
# ============================================================================
# Written to ratchet-log/iteration-NNN/meta-judge-output.yaml

meta_judge:
  iteration: 3
  duration_seconds: 28
  state_decision: FIX                   # DONE | FIX | SPEC_DRIFT | GAMING_RISK | NEEDS_HUMAN

  threshold_evaluation:
    - threshold: unit_coverage >= 0.80
      actual: 0.87
      passed: true
    - threshold: integration_coverage >= 0.60
      actual: 0.62
      passed: true
    - threshold: mutation_kill_rate >= 0.70
      actual: 0.758
      passed: true
    - threshold: gaming_risk_score < 3
      actual: 5
      passed: false                     # would trigger GAMING_RISK if >= 7; at 5 it's a FIX-level concern

  deduplicated_findings:
    - merged_finding_id: mf-001
      sources:                          # the original finding IDs from per-role outputs
        - role: adversarial-reviewer
          finding_id: ar-001
          vendor: openai
        - role: edge-case-hunter
          finding_id: eh-001
          vendor: claude
      confidence_boost: +0.4            # multi-source + cross-vendor
      synthesized_severity: P0
      issue: "concurrent cancellation race + trial-state regression both indicate inadequate state mutation discipline at L42-L47"
      blocking: true
    - merged_finding_id: mf-002
      sources:
        - role: requirement-tracer
          finding_id: rt-001
          vendor: claude
      confidence_boost: 0               # single source
      synthesized_severity: P1
      issue: "REQ-002 UTC timestamp violation"
      blocking: true

  rebutted_findings:                    # what didn't survive S2
    - role: design-reviewer
      finding_id: dr-001
      rebutter: edge-case-hunter
      rebuttal_summary: "tier expansion is documented as future work in tasks.md ## phase-2; current REQ scope does not cover it"

  conflict_arbitration: []              # no conflicts this iteration

  needs_human_items: []                 # nothing requires human intervention

  fix_prompt_basis:                     # what FIX-state generation should use
    - mf-001
    - mf-002
    - gd-001                            # gaming finding folded into FIX since score < 7

  notes: |
    Iteration 3 of 5. Spec-drift counter at 0 (no PBT counterexamples consistent
    with REQ text recurring). Gaming risk trending up (iteration 1: 2, iteration
    2: 3, iteration 3: 5) — if next iteration hits 7+, escalate to GAMING_RISK.
