# finding-schema.yaml — single output schema for all 8 evaluators + meta-judge
#
# Every evaluator role writes ONE file: ratchet-log/iteration-NNN/fleet-outputs/<role>.yaml
# Files MUST conform to the per-role shape below. Schema violations get one re-prompt; second
# failure = drop that role's output and proceed (better silent partial than corrupted aggregation).
#
# Meta-judge writes ratchet-log/iteration-NNN/meta-judge-output.yaml — last section.

# ============================================================================
# COMMON META BLOCK — every fleet output starts with this
# ============================================================================
# (NOT a top-level key in the file — embed these fields at the top level of the YAML)
#
# role: <role-name>                     # one of: test-runner / existence-checker / requirement-tracer /
#                                       #         design-reviewer / adversarial-reviewer / edge-case-hunter /
#                                       #         e2e-explorer / spec-gaming-detector
# model: <model-id>                     # the actual model used, e.g. claude-opus-4-7 or codex-gpt-5
# iteration: <integer>                  # iteration number this run belongs to
# vendor: <claude | openai | google>    # for cross-vendor weighting in meta-judge
# duration_seconds: <integer>
# skipped: <reason>                     # OPTIONAL — if set, findings: [] and the run is partial

