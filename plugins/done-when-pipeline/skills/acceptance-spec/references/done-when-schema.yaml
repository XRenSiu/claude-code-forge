# done_when.yaml — schema (v1, aligned with done-when-pipeline.md Appendix C)
#
# This file is the contract between acceptance-spec (producer) and
# everything downstream (test-suite-generator consumes it to derive tests;
# ratchet consumes it as the kill/restart/done oracle).
#
# AUTHORITATIVE SOURCE
# --------------------
# The design document `done-when-pipeline.md` Appendix C defines schema v1.
# This file is a faithful, literal reproduction. Do NOT introduce sub-fields
# that are not in Appendix C. Traceability is preserved by:
#   - the top-level `based_on:` list (the union of all REQ-IDs the contract covers)
#   - the sibling `spec.md`, where every REQ has a `source:` line
#   - the descriptive test name (which references the REQ semantically)
#
# If you feel tempted to add `based_on:` / `property_type:` / `tool:` on a leaf
# entry — DON'T. v1 forbids it. Push the traceability into the name, or into the
# top-level `based_on:`. A future v2 may admit traceability sub-fields, but until
# the design doc is amended, this skill emits strict v1.

# ============================================================================
# TOP-LEVEL METADATA
# ============================================================================
feature: <kebab-case-slug>          # MUST match the directory name (e.g. subscription-cancellation)
based_on: [<REQ-ID>, ...]           # union of all REQ IDs from spec.md this contract derives from
created_at: <ISO-8601 timestamp>
created_by: <skill-name>            # plain skill name; do not append version. e.g. acceptance-spec

# ============================================================================
# LAYER 1 — EXISTENCE
# ============================================================================
# Concrete nouns the spec promised will exist. Each one becomes a single
# grep / AST check by test-suite-generator. Fast, cheap, fail-fast.
#
# v1 allows EXACTLY these five kinds. Each entry is a single key-value pair,
# with NO sub-fields. (Appendix C lines 996-1001.)
#
#   - file: <path>                         # file must exist
#   - function: <name>                     # function must be exported
#   - route: <METHOD> <path>               # HTTP route registered
#   - db_field: <table>.<column>           # DB column exists (schema/migration)
#   - frontend_component: <name>           # named component exists

existence:
  - file: src/billing/cancel_subscription_use_case.ts
  - function: CancelSubscriptionUseCase
  - route: POST /api/subscription/cancel
  - db_field: subscription.status
  - frontend_component: CancelSubscriptionButton

# ============================================================================
# LAYER 2 — BEHAVIOR
# ============================================================================
# Names of tests that must exist AND pass. v1 schema: each leaf is a BARE STRING
# (the test name). NO `name:`/`based_on:`/`property_type:`/`dependencies:`/`tool:`
# sub-fields are allowed. (Appendix C lines 1003-1024.)
#
# Naming convention: descriptive snake_case. Bake the REQ-anchored semantic into
# the name itself (e.g. `test_cancel_active_is_idempotent` makes the REQ
# obvious to a human reader; the explicit REQ → test mapping is recovered by
# the union top-level `based_on:` plus spec.md `source:` lines).
#
# property_based test names should encode the property archetype in the name
# (one of: invariant / idempotent / reversible / boundary / monotonic / state_machine),
# e.g. `test_cancel_is_idempotent`. test-suite-generator infers the PBT type
# from the name suffix when emitting Hypothesis/fast-check code.

behavior:
  unit_tests:
    example_based:
      - test_cancel_active_sets_status_to_cancelled_active
      - test_cancel_records_cancellation_timestamp
    property_based:
      - test_cancel_is_idempotent
      - test_cancel_preserves_end_date_invariant

  integration_tests:
    example_based:
      - test_cancel_api_returns_200_and_correct_payload
      - test_cancel_triggers_confirmation_email
    property_based:
      - test_subscription_status_state_machine_is_well_formed

  e2e_tests:
    - test_user_can_cancel_active_subscription_via_ui

  thresholds:
    unit_coverage: ">= 0.80"               # of lines in code that implements based_on REQs
    integration_coverage: ">= 0.60"
    mutation_kill_rate: ">= 0.70"          # MANDATORY — anti reward-hacking
    pbt_runs_per_property: ">= 500"        # min Hypothesis/fast-check samples per property

# ============================================================================
# LAYER 3 — FITNESS (soft, LLM-judged or human-judged)
# ============================================================================
# Things genuinely outside mechanical reach. KEEP THIS LIST SHORT (max 3 entries).
# Rule of thumb: if you can think of a programmatic test for it, move it to
# behavior. LLM/human judging is a layer of last resort.
#
# v1 schema: each entry has EXACTLY these keys (Appendix C lines 1027-1030):
#   - criterion:        <description>
#   - judge:            <persona-judge | programmatic | manual>   # three-value enum
#   - score_threshold:  <expr>                                    # only when judge != programmatic
#
# Enum semantics (per Appendix C and §4.7 of the design doc):
#   - persona-judge  → LLM-as-judge entry point. Per the design doc §4.7,
#                      the persona-judge skill is the designated "主力"
#                      (primary) for evaluating fitness criteria. A rubric
#                      file (produced by test-suite-generator 4-F) drives it.
#   - programmatic   → a script returns pass/fail. No score_threshold needed.
#   - manual         → a human eyeballs it. Only for truly tacit things.
#
# Do NOT use `llm-rubric` — it is not in the v1 enum. The LLM-judge path is
# `persona-judge`. (test-suite-generator still emits a rubric markdown file,
# but the `judge:` value in done_when.yaml stays `persona-judge`.)

fitness:
  - criterion: a third-party developer can build a CLI using only the README, with no follow-up questions
    judge: persona-judge
    score_threshold: ">= 8/10"
  - criterion: README quickstart runs zero-modification
    judge: programmatic
    # programmatic judges have no score_threshold — they're pass/fail.

# ============================================================================
# SPEC-DRIFT THRESHOLD
# ============================================================================
# v1 schema (Appendix C lines 1033-1034) defines exactly one sub-field:
#   - max_fix_loops_before_escalation: <integer>
#
# Do NOT add `applies_to:` or any other sub-field — those are not in v1.
#
# IMPORTANT: ratchet does NOT read this field automatically. When chaining to
# /ratchet, you (the human) translate it into ratchet's own `convergence`
# field. See done-when-pipeline/INTEGRATION.md for the translation recipe.
# A wrapper skill that automates this is future work.

spec_drift_threshold:
  max_fix_loops_before_escalation: 3       # PBT 失败 N 次后退回 Step 2 (Appendix C default)
