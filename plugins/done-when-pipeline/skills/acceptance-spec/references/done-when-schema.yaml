# done_when.yaml — schema (v1)
#
# This file is the contract between acceptance-spec (producer) and
# everything downstream (test-suite-generator consumes it to derive tests;
# ratchet consumes it as the kill/restart/done oracle).
#
# Every entry traces back to a REQ-ID in spec.md (via `based_on:`),
# so traceability is enforced, not aspirational.
#
# Use this file as the literal template — copy it, fill it in.

feature: <kebab-case-slug>          # MUST match the directory name
based_on: [<REQ-ID>, ...]           # All REQ IDs from spec.md this contract derives from
created_at: <ISO-8601 timestamp>
created_by: acceptance-spec/<version>

# ============================================================================
# LAYER 1 — EXISTENCE
# ============================================================================
# Concrete nouns the spec promised will exist. Each one becomes a single
# grep / AST check by test-suite-generator. Fast, cheap, fail-fast.
#
# Be conservative: only list things that *must* exist for the spec to be
# implementable as described. Do not list optional helpers, internal funcs,
# or things you assume will be there — that's the implementer's freedom.
#
# Allowed kinds (use exactly one per entry):
#   - file: <path>                         # file must exist
#   - function: <name>                     # function/class must be exported
#   - route: <METHOD> <path>               # HTTP route registered
#   - db_field: <table>.<column>           # DB column exists (schema/migration)
#   - frontend_component: <name>           # named component exists
#   - env_var: <NAME>                      # required env var documented
#   - cli_command: <invocation>            # CLI subcommand exists

existence:
  - file: <path>
    based_on: [REQ-001]
  - function: <name>
    based_on: [REQ-002]
  - route: POST /api/...
    based_on: [REQ-001]
  - db_field: <table>.<column>
    based_on: [REQ-002]
  - frontend_component: <ComponentName>
    based_on: [REQ-001]

# ============================================================================
# LAYER 2 — BEHAVIOR
# ============================================================================
# Names of tests that must exist AND pass. Names only — the actual code is
# generated by test-suite-generator. Partition by pyramid layer × style.
#
# Naming convention: descriptive snake_case (or kebab, project-style).
# Each test gets `based_on:` pointing to the REQ(s) it verifies.
#
# Thresholds at the bottom set the numeric bars ratchet enforces.

behavior:
  unit_tests:
    example_based:
      - name: test_<what>_does_<expected>
        based_on: [REQ-001]
      - name: test_<another>
        based_on: [REQ-002]
    property_based:
      - name: test_<verb>_is_<property>   # e.g. test_cancel_is_idempotent
        property_type: idempotent          # one of: invariant | idempotent | reversible | boundary | monotonic | state_machine
        based_on: [REQ-001]

  integration_tests:
    example_based:
      - name: test_<flow>_end_to_end
        based_on: [REQ-001, REQ-002]
        dependencies: [postgres, redis]    # testcontainers will spin these up
    property_based:
      - name: test_<operation>_atomicity_across_modules
        property_type: invariant
        based_on: [REQ-001, REQ-002]
        dependencies: [postgres]

  e2e_tests:
    - name: test_user_can_<journey>_via_ui
      based_on: [REQ-001]
      tool: playwright                     # playwright | cypress | appium | maestro
    # Keep this list SHORT. E2E is slow and flaky. Only the genuinely-critical
    # user journeys belong here.

  thresholds:
    unit_coverage: ">= 0.80"               # of lines in code that implements based_on REQs
    integration_coverage: ">= 0.60"
    mutation_kill_rate: ">= 0.70"          # MANDATORY — anti reward-hacking
    pbt_runs_per_property: ">= 500"        # min Hypothesis/fast-check samples per property

# ============================================================================
# LAYER 3 — FITNESS (soft, LLM-judged or human-judged)
# ============================================================================
# Things genuinely outside mechanical reach. KEEP THIS LIST SHORT.
# Rule of thumb: if you can think of a programmatic test for it, move it
# to behavior. LLM/human judging is a layer of last resort.
#
# `judge:` values:
#   programmatic  — a script returns pass/fail. Not really LLM-judge; here for symmetry.
#   llm-rubric    — a fresh Claude session (no implementer context) reads the
#                   rubric file + artifacts and emits a score per the structured
#                   sub-dimensions. Currently invoked manually — see
#                   test-suite-generator/references/fitness-rubric-guide.md
#                   for the "Claude-with-rubric inline" pattern. A packaged
#                   fitness-judge skill that automates this does not exist yet.
#   manual        — a human eyeballs it. Only acceptable for things truly tacit.
#
# NOTE: the persona-judge skill from the persona-distill plugin is NOT a
# general-purpose fitness judge. It's a quality gate for distilled persona
# skills (e.g. steve-jobs-mirror). Do not write `judge: persona-judge` here
# unless you genuinely mean "evaluate the quality of a persona skill".

fitness:
  - criterion: <one-line description, e.g. "an independent agent can call this API using only the README">
    judge: llm-rubric
    rubric_file: tests/<feature>/fitness/<slug>.rubric.md     # produced by test-suite-generator
    score_threshold: ">= 8/10"
  - criterion: <e.g. "README quickstart runs zero-modification">
    judge: programmatic
    # programmatic judges have no score_threshold — they're pass/fail.

# ============================================================================
# SPEC-DRIFT THRESHOLD (guidance, NOT auto-honored by ratchet)
# ============================================================================
# How many unproductive fix loops should pass before STOPPING and asking the
# user to re-examine the spec. PBT failures often indicate the spec is buggy,
# not the code.
#
# IMPORTANT: ratchet does NOT read this field automatically. When you chain
# to /ratchet, you (the human) translate it into ratchet's own `convergence`
# field. See done-when-pipeline/INTEGRATION.md for the translation recipe.
# A wrapper skill that automates this is future work.

spec_drift_threshold:
  max_fix_loops_before_escalation: 3       # → set ratchet's `convergence` to this
  applies_to:                              # which threshold misses count as "fix loop fail"
    - mutation_kill_rate
    - property_based_failure
