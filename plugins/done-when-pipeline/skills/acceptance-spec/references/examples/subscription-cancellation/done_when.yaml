feature: subscription-cancellation
based_on: [REQ-001, REQ-002, REQ-003, REQ-004, REQ-005, REQ-006]
created_at: 2026-05-24T00:00:00Z
created_by: acceptance-spec/0.1.0

# ============================================================================
# LAYER 1 — EXISTENCE
# ============================================================================
existence:
  - file: src/billing/cancel_subscription_use_case.ts
    based_on: [REQ-001]
  - file: src/billing/reactivate_subscription_use_case.ts
    based_on: [REQ-006]
  - function: CancelSubscriptionUseCase
    based_on: [REQ-001]
  - function: ReactivateSubscriptionUseCase
    based_on: [REQ-006]
  - function: ExpireSubscriptionJob
    based_on: [REQ-002]
  - route: POST /api/subscription/cancel
    based_on: [REQ-001, REQ-004]
  - route: POST /api/subscription/reactivate
    based_on: [REQ-006]
  - db_field: subscription.status     # enum must include the four added values
    based_on: [REQ-001, REQ-002, REQ-004]
  - db_field: subscription.cancelled_at
    based_on: [REQ-001]
  - db_field: subscription.end_date
    based_on: [REQ-002]
  - frontend_component: CancelSubscriptionButton
    based_on: [REQ-001]
  - frontend_component: ExpiryNoticeBanner
    based_on: [REQ-003, REQ-006]

# ============================================================================
# LAYER 2 — BEHAVIOR
# ============================================================================
behavior:
  unit_tests:
    example_based:
      - name: test_cancel_active_sets_status_to_cancelled_active
        based_on: [REQ-001]
      - name: test_cancel_records_cancellation_timestamp
        based_on: [REQ-001]
      - name: test_cancel_clears_future_scheduled_charges
        based_on: [REQ-001]
      - name: test_cancel_trialing_sets_status_to_cancelled_expired
        based_on: [REQ-004]
      - name: test_cancel_trialing_does_not_create_charge
        based_on: [REQ-004]
      - name: test_reactivate_in_cancelled_active_restores_status_and_schedules_charge
        based_on: [REQ-006]
      - name: test_create_new_subscription_while_cancelled_active_is_rejected
        based_on: [REQ-005]

    property_based:
      - name: test_cancel_preserves_end_date
        property_type: invariant
        based_on: [REQ-002]
      - name: test_cancel_is_idempotent
        property_type: idempotent
        based_on: [REQ-001]
      - name: test_cancel_then_reactivate_is_inverse_within_window
        property_type: reversible
        based_on: [REQ-001, REQ-006]
      - name: test_no_charge_scheduled_in_future_after_cancel
        property_type: invariant
        based_on: [REQ-001]

  integration_tests:
    example_based:
      - name: test_cancel_api_returns_200_and_correct_payload
        based_on: [REQ-001]
        dependencies: [postgres]
      - name: test_cancel_triggers_confirmation_email
        based_on: [REQ-001]
        dependencies: [postgres, smtp_mock]
      - name: test_cancelled_active_user_still_accesses_premium_until_end_date
        based_on: [REQ-002]
        dependencies: [postgres]
      - name: test_expire_job_transitions_cancelled_active_to_expired_at_utc_boundary
        based_on: [REQ-002]
        dependencies: [postgres]

    property_based:
      - name: test_cancel_atomicity_across_billing_and_access_modules
        property_type: invariant
        based_on: [REQ-001]
        dependencies: [postgres]
      - name: test_subscription_status_state_machine_is_well_formed
        property_type: state_machine
        based_on: [REQ-001, REQ-002, REQ-004, REQ-006]
        dependencies: [postgres]

  e2e_tests:
    - name: test_user_can_cancel_active_subscription_via_ui
      based_on: [REQ-001]
      tool: playwright
    - name: test_cancelled_user_sees_expiry_notice_on_login
      based_on: [REQ-003]
      tool: playwright

  thresholds:
    unit_coverage: ">= 0.80"
    integration_coverage: ">= 0.60"
    mutation_kill_rate: ">= 0.70"
    pbt_runs_per_property: ">= 500"

# ============================================================================
# LAYER 3 — FITNESS (soft, kept short on purpose)
# ============================================================================
# judge ∈ {programmatic, llm-rubric, manual}; see ../../done-when-schema.yaml.
# llm-rubric criteria are scored manually by a fresh Claude session per the
# rubric file (no packaged automation yet — see INTEGRATION.md).
fitness:
  - criterion: a third-party developer can build a CLI for cancellation using only the API reference, with no clarifying questions
    judge: llm-rubric
    rubric_file: tests/subscription-cancellation/fitness/api_callable_by_independent_engineer.rubric.md
    score_threshold: ">= 8/10"
  - criterion: help-center article reads cleanly to a non-technical user and answers "what happens to my data after I cancel"
    judge: llm-rubric
    rubric_file: tests/subscription-cancellation/fitness/help_article_reads_clearly.rubric.md
    score_threshold: ">= 8/10"

spec_drift_threshold:
  # Guidance only — when chaining to /ratchet, translate into ratchet's `convergence`.
  max_fix_loops_before_escalation: 3
  applies_to:
    - mutation_kill_rate
    - property_based_failure
