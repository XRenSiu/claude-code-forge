    reason: profile kansei was the UNION of 3 divergent concepts; 'raw' was concept C's lean, not winner B's
    where_it_manifests_in_product: [concept C — not selected]
  - kansei: terminal-native
    reason: concept C's lean (brutalist terminal); winner B is editorial, deliberately the opposite
    where_it_manifests_in_product: [concept C — not selected]
